  <!-- week labels -->
  <g class="ax">
    <text x="89"  y="68" text-anchor="middle">w1</text>
    <text x="133" y="68" text-anchor="middle">w3</text>
    <text x="177" y="68" text-anchor="middle">w5</text>
    <text x="221" y="68" text-anchor="middle">w7</text>
    <text x="265" y="68" text-anchor="middle">w9</text>
    <text x="309" y="68" text-anchor="middle">w11</text>
    <text x="353" y="68" text-anchor="middle">w13</text>
  </g>

  <!-- legend -->
  <g transform="translate(400,82)">
    <rect x="0"   y="0"  width="14" height="14" rx="3" class="empty"/>
    <text class="cb" x="20" y="11">no med</text>
    <rect x="0"   y="22" width="14" height="14" rx="3" class="filled"/>
    <text class="cb" x="20" y="33">acute med</text>
  </g>

  <!-- monthly summary callout -->
  <g transform="translate(400,140)">
    <rect x="0" y="0" width="170" height="86" rx="6" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
    <text class="cb" x="12" y="22">Mo 1 (w1–4):  7 d</text>
    <text class="cb" x="12" y="42">Mo 2 (w5–8):  9 d</text>
    <text class="cb" x="12" y="62" fill="#b45309">Mo 3 (w9–13): 10 d</text>
    <line x1="12" y1="70" x2="158" y2="70" stroke="#fde68a" stroke-width="1"/>
    <text class="cb" x="12" y="82" fill="#b45309">↑ at 10 d/mo limit</text>
  </g>
