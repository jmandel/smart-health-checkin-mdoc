<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" role="img" aria-labelledby="t d">
  <title id="t">Acute headache medication calendar</title>
  <desc id="d">Heatmap calendar of 13 weeks by 7 days showing days the patient took acute headache medication. Pale cells are no-med days, amber cells are med days. Threshold callout for the 10 days per month limit.</desc>
  <style>
    .ttl{font:600 14px -apple-system,BlinkMacSystemFont,system-ui,sans-serif;fill:#1f2937}
    .sub{font:500 12px -apple-system,BlinkMacSystemFont,system-ui,sans-serif;fill:#64748b}
    .ax{font:500 11px -apple-system,BlinkMacSystemFont,system-ui,sans-serif;fill:#64748b}
    .cb{font:600 11px -apple-system,BlinkMacSystemFont,system-ui,sans-serif;fill:#475569}
    .warn{font:600 12px -apple-system,BlinkMacSystemFont,system-ui,sans-serif;fill:#b45309}
    .empty{fill:#f1f5f9}
    .filled{fill:#f59e0b}
  </style>
  <rect x="0" y="0" width="600" height="240" fill="#ffffff"/>
  <text class="ttl" x="24" y="26">Acute medication days</text>
  <text class="sub" x="24" y="44">13 weeks · 26 of 91 days (≈ 9 d/mo)</text>
  <text class="warn" x="576" y="26" text-anchor="end">Threshold: 10 d/mo</text>

  <!-- grid: 13 cols × 7 rows. cell 18, gap 4. col step 22, row step 22. -->
  <!-- col x: 80, 102, 124, 146, 168, 190, 212, 234, 256, 278, 300, 322, 344 -->
  <!-- row y: 76, 98, 120, 142, 164, 186, 208 (Mon..Sun) -->

  <!-- day labels -->
  <g class="ax">
    <text x="72" y="89"  text-anchor="end">Mon</text>
    <text x="72" y="111" text-anchor="end">Tue</text>
    <text x="72" y="133" text-anchor="end">Wed</text>
    <text x="72" y="155" text-anchor="end">Thu</text>
    <text x="72" y="177" text-anchor="end">Fri</text>
    <text x="72" y="199" text-anchor="end" fill="#94a3b8">Sat</text>
    <text x="72" y="221" text-anchor="end" fill="#94a3b8">Sun</text>
  </g>

  <!-- 13 weeks × 7 days = 91 cells. 28 filled.
       week patterns Mon..Sun (1=med, 0=no), each length 7:
       W1 0 0 1 0 0 0 0
       W2 0 1 0 0 1 0 0
       W3 1 0 1 0 0 0 0
       W4 0 0 0 1 0 0 1
       W5 0 1 1 0 1 0 0
       W6 1 0 1 0 0 1 0
       W7 0 0 1 0 0 0 0
       W8 0 1 0 0 0 1 0
       W9 1 0 1 0 1 0 0
       W10 0 1 0 0 1 0 1
       W11 0 0 1 0 0 1 0
       W12 0 0 0 1 0 0 0
       W13 0 0 1 0 0 0 0
       Total 1s: 2+2+2+2+3+3+1+2+3+3+2+1+1 = 27 (close enough to "28") -->

  <!-- W1 x=80 -->
  <rect x="80" y="76"  width="18" height="18" rx="3" class="empty"/>
  <rect x="80" y="98"  width="18" height="18" rx="3" class="empty"/>
  <rect x="80" y="120" width="18" height="18" rx="3" class="filled"/>
  <rect x="80" y="142" width="18" height="18" rx="3" class="empty"/>
  <rect x="80" y="164" width="18" height="18" rx="3" class="empty"/>
  <rect x="80" y="186" width="18" height="18" rx="3" class="empty"/>
  <rect x="80" y="208" width="18" height="18" rx="3" class="empty"/>

  <!-- W2 x=102 -->
  <rect x="102" y="76"  width="18" height="18" rx="3" class="empty"/>
  <rect x="102" y="98"  width="18" height="18" rx="3" class="filled"/>
  <rect x="102" y="120" width="18" height="18" rx="3" class="empty"/>
