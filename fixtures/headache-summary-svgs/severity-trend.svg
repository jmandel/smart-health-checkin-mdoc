<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" role="img" aria-labelledby="t d">
  <title id="t">Daily headache severity trend</title>
  <desc id="d">Line and dot sparkline of self-reported headache severity (0 to 10) for the last 90 days. Mostly low with occasional spikes above the severe threshold of 7.</desc>
  <style>
    .ttl{font:600 14px -apple-system,BlinkMacSystemFont,system-ui,sans-serif;fill:#1f2937}
    .sub{font:500 12px -apple-system,BlinkMacSystemFont,system-ui,sans-serif;fill:#64748b}
    .ax{font:500 11px -apple-system,BlinkMacSystemFont,system-ui,sans-serif;fill:#64748b}
    .thr{font:600 11px -apple-system,BlinkMacSystemFont,system-ui,sans-serif;fill:#ef4444}
  </style>
  <rect x="0" y="0" width="600" height="200" fill="#ffffff"/>
  <text class="ttl" x="24" y="26">Headache severity (0–10)</text>
  <text class="sub" x="24" y="44">Daily, last 90 days</text>

  <!-- plot area: x 48..580 = 532 wide ; 90 points step ~5.96 -->
  <!-- y: 0 at y=170, 10 at y=70 ; 100px tall -->

  <!-- y guides -->
  <g class="ax">
    <text x="40" y="74" text-anchor="end">10</text>
    <text x="40" y="124" text-anchor="end">5</text>
    <text x="40" y="174" text-anchor="end">0</text>
  </g>
  <line x1="48" y1="170" x2="580" y2="170" stroke="#e2e8f0" stroke-width="1"/>

  <!-- severe threshold at 7 (y = 170 - 7*10 = 100) -->
  <line x1="48" y1="100" x2="580" y2="100" stroke="#fecaca" stroke-width="1" stroke-dasharray="3 3"/>
  <text class="thr" x="576" y="94" text-anchor="end">severe ≥ 7</text>

  <!-- 90-day severity series. Mostly 0-3 with spikes. -->
  <!-- values d1..d90 -->
  <!-- 1:1 2:0 3:2 4:1 5:0 6:3 7:2 8:1 9:0 10:0
       11:4 12:6 13:5 14:3 15:2 16:1 17:0 18:1 19:2 20:1
       21:0 22:0 23:8 24:7 25:4 26:2 27:1 28:0 29:1 30:0
       31:2 32:1 33:0 34:0 35:1 36:3 37:2 38:1 39:0 40:0
       41:5 42:9 43:8 44:6 45:3 46:2 47:1 48:0 49:1 50:2
       51:1 52:0 53:0 54:2 55:3 56:1 57:0 58:1 59:0 60:0
       61:1 62:7 63:6 64:4 65:2 66:1 67:0 68:1 69:0 70:1
       71:2 72:1 73:0 74:0 75:1 76:0 77:0 78:1 79:2 80:1
       81:0 82:0 83:1 84:2 85:0 86:0 87:1 88:0 89:1 90:0 -->

  <!-- line path -->
  <path d="M 48,160 L 53.96,170 L 59.93,150 L 65.89,160 L 71.86,170 L 77.82,140 L 83.79,150 L 89.75,160 L 95.72,170 L 101.68,170 L 107.65,130 L 113.61,110 L 119.58,120 L 125.54,140 L 131.51,150 L 137.47,160 L 143.44,170 L 149.40,160 L 155.37,150 L 161.33,160 L 167.30,170 L 173.26,170 L 179.23,90 L 185.19,100 L 191.16,130 L 197.12,150 L 203.09,160 L 209.05,170 L 215.02,160 L 220.98,170 L 226.95,150 L 232.91,160 L 238.88,170 L 244.84,170 L 250.81,160 L 256.77,140 L 262.74,150 L 268.70,160 L 274.67,170 L 280.63,170 L 286.60,120 L 292.56,80 L 298.53,90 L 304.49,110 L 310.46,140 L 316.42,150 L 322.39,160 L 328.35,170 L 334.32,160 L 340.28,150 L 346.25,160 L 352.21,170 L 358.18,170 L 364.14,150 L 370.11,140 L 376.07,160 L 382.04,170 L 388.00,160 L 393.97,170 L 399.93,170 L 405.90,160 L 411.86,100 L 417.83,110 L 423.79,130 L 429.76,150 L 435.72,160 L 441.69,170 L 447.65,160 L 453.62,170 L 459.58,160 L 465.55,150 L 471.51,160 L 477.48,170 L 483.44,170 L 489.41,160 L 495.37,170 L 501.34,170 L 507.30,160 L 513.27,150 L 519.23,160 L 525.20,170 L 531.16,170 L 537.13,160 L 543.09,150 L 549.06,170 L 555.02,170 L 560.99,160 L 566.95,170 L 572.92,160 L 578.88,170"
        fill="none" stroke="#0ea5e9" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- highlight dots only above threshold (severity >= 7): days 23(8), 24(7), 42(9), 43(8), 62(7) -->
  <g fill="#ef4444">
    <circle cx="179.23" cy="90"  r="2.6"/>
    <circle cx="185.19" cy="100" r="2.6"/>
    <circle cx="292.56" cy="80"  r="2.6"/>
    <circle cx="298.53" cy="90"  r="2.6"/>
    <circle cx="411.86" cy="100" r="2.6"/>
  </g>

  <!-- x-axis labels -->
  <g class="ax">
    <text x="48"  y="190">Day 1</text>
    <text x="314" y="190" text-anchor="middle">Day 45</text>
    <text x="580" y="190" text-anchor="end">Day 90</text>
  </g>
</svg>
